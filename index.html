<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DigiLocker Clone</title>
    
    

    <link rel="stylesheet" href="style.css">
</head>


<body>

<table width="100%" height="100%" border="1">
    <tr>

        <!-- Left Section -->
        <td width="35%" valign="top">
            <h1>DigiLocker</h1>
            <h3>Secure Document Wallet to Empower Citizens</h3>

            <br><br>

            <button>SIGN IN</button><br><br>
            <button>SIGN UP</button>

            <br><br>
            <p>Scan QR code for verification</p>
        </td>

        <!-- Right Section -->
        <td width="65%" valign="top">

            <table width="100%">
                <tr>
                    <td><h2>DigiLocker</h2></td>
                    <td align="right"></td>
                </tr>
            </table>

            <br><br>

            <p><b>Please provide a mobile number to sign up for a DigiLocker account</b></p>

            <input type="text" placeholder="Mobile Number"><br><br>
            <button>VERIFY</button>

            <br><br>

            <p><b>Just one more step to complete signup</b></p>

            <input type="text" placeholder="Enter OTP"><br><br>
            <input type="text" placeholder="Username"><br><br>
            <input type="password" placeholder="Password"><br><br>

            <button>CONTINUE</button>

        </td>

    </tr>
</table>

</body>
<script src="script.js"></script>
</html>
